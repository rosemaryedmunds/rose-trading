[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."notion-proxy"]
  timeout = 26

[functions."anthropic-proxy"]
  timeout = 26

[functions."morning-brief"]
  timeout = 30

[functions."discord-morning-brief"]
  timeout = 30
  # Runs Mon–Fri at 8:00 AM CT (13:00 UTC)
  schedule = "0 13 * * 1-5"

  [functions]
  timeout = 26

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
